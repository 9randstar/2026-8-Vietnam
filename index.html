<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>2026 베트남 여행</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --hanoi:    #c0392b;
      --hanoi-mid:#e07060;
      --sapa:     #1a6b5c;
      --sapa-mid: #6ab8a8;
      --ink:      #1a1a1a;
      --muted:    #6b7280;
      --subtle:   #9ca3af;
      --line:     #e5e7eb;
      --surface:  #ffffff;
      --bg:       #f8f7f5;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg); color: var(--ink); line-height: 1.5;
    }

    /* ── TOP NAV ── */
    .top-nav {
      background: var(--surface); border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 200;
    }
    .top-nav-inner { max-width: 900px; margin: 0 auto; display: flex; }
    .top-tab {
      flex: 1; padding: 16px 12px;
      background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600;
      color: var(--muted); transition: all 0.18s; text-align: center;
    }
    .top-tab:hover { color: var(--ink); }
    .top-tab.active { color: var(--ink); border-bottom-color: var(--ink); }

    /* ── HERO ── */
    .hero {
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 0 32px 40px;
    }
    .hero-img {
      position: absolute; inset: 0;
      background: center / cover no-repeat;
    }
    .hero-img::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(15,20,30,0.82) 0%, rgba(15,20,30,0.2) 55%, transparent 100%);
    }
    .hero-inner { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; width: 100%; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 100px;
      padding: 5px 14px; color: rgba(255,255,255,0.9);
      font-size: 12px; font-weight: 500; letter-spacing: 0.04em; margin-bottom: 14px;
    }
    .hero-eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: #f8a5a0; }
    .hero h1 { font-size: clamp(34px, 6vw, 64px); font-weight: 700; color: #fff; line-height: 1.05; letter-spacing: -0.5px; }
    .hero-meta { display: flex; gap: 16px; align-items: center; margin-top: 14px; color: rgba(255,255,255,0.7); font-size: 13px; }
    .hero-meta .sep { color: rgba(255,255,255,0.3); }

    /* ── SUMMARY PILLS ── */
    .summary-row {
      display: flex; flex-wrap: wrap; gap: 10px;
      max-width: 900px; margin: 0 auto; padding: 20px 32px 18px;
    }
    .summary-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 100px; padding: 7px 14px; font-size: 13px;
    }
    .summary-pill .pill-label { color: var(--muted); font-size: 12px; }

    /* ── SUB NAV ── */
    .sub-nav {
      background: var(--surface); border-bottom: 1px solid var(--line);
      position: sticky; top: 49px; z-index: 100;
    }
    .sub-nav-inner {
      max-width: 900px; margin: 0 auto;
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .sub-nav-inner::-webkit-scrollbar { display: none; }
    .sub-btn {
      flex-shrink: 0; display: flex; align-items: center; gap: 7px;
      padding: 13px 18px; background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500;
      color: var(--muted); transition: all 0.18s; white-space: nowrap;
    }
    .sub-btn:hover { color: var(--ink); }
    .sub-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
    .sub-btn .pip { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.4; transition: opacity 0.18s; }
    .sub-btn.active .pip { opacity: 1; }
    .sub-btn[data-city="hanoi"].active  { color: var(--hanoi);  border-bottom-color: var(--hanoi); }
    .sub-btn[data-city="sapa"].active   { color: var(--sapa);   border-bottom-color: var(--sapa); }

    /* ── CONTENT ── */
    .content-area { max-width: 900px; margin: 0 auto; padding: 40px 32px 80px; }

    /* ── CITY SECTION ── */
    .city-section { margin-bottom: 52px; }
    .city-section:last-child { margin-bottom: 0; }
    .city-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 18px; }
    .city-header h2 { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
    .city-header .city-range {
      font-size: 12px; color: var(--muted); padding: 3px 10px;
      background: var(--bg); border-radius: 100px; border: 1px solid var(--line);
    }
    .hanoi .city-header h2  { color: var(--hanoi); }
    .sapa  .city-header h2  { color: var(--sapa); }

    /* ── DAY CARDS ── */
    .days-grid { display: grid; gap: 10px; }
    .day-card {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 14px; overflow: hidden; transition: box-shadow 0.18s;
    }
    .day-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
    .hanoi .day-card { border-left: 3px solid var(--hanoi); }
    .sapa  .day-card { border-left: 3px solid var(--sapa); }

    .day-card-head { display: flex; align-items: center; }
    .day-date-col {
      flex-shrink: 0; width: 80px; padding: 16px 12px;
      border-right: 1px solid var(--line); text-align: center;
    }
    .day-date-num { font-size: 18px; font-weight: 700; }
    .day-date-dow { font-size: 11px; color: var(--subtle); margin-top: 2px; }
    .day-title-col { flex: 1; padding: 16px 18px; }
    .day-title-col h3 { font-size: 14px; font-weight: 500; letter-spacing: -0.1px; }

    /* ── STOPS ── */
    .stops { padding: 0 18px 18px 96px; display: flex; flex-direction: column; }
    .stop-row { display: flex; align-items: flex-start; padding: 4px 0; }
    .stop-line-col { flex-shrink: 0; width: 26px; display: flex; flex-direction: column; align-items: center; }
    .stop-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
    .stop-connector { width: 1px; flex: 1; min-height: 10px; background: var(--line); margin-top: 2px; }
    .stop-row:last-child .stop-connector { display: none; }
    .stop-text { font-size: 13px; padding: 3px 0; line-height: 1.4; }
    .hanoi .stop-dot { background: var(--hanoi-mid); }
    .sapa  .stop-dot { background: var(--sapa-mid); }

    /* ── EATS TAB ── */
    .landmark-strip { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 24px; }
    .lm-btn {
      padding: 6px 13px; background: var(--surface);
      border: 1px solid var(--line); border-radius: 100px;
      cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500;
      color: var(--muted); transition: all 0.18s; white-space: nowrap;
    }
    .lm-btn:hover { border-color: #aab4be; color: var(--ink); }
    .lm-btn.active { background: var(--ink); border-color: var(--ink); color: #fff; }

    .eats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .place-card {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 14px; overflow: hidden;
      cursor: pointer; transition: box-shadow 0.18s, transform 0.18s;
      text-decoration: none; color: inherit; display: block;
    }
    .place-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .place-info { padding: 15px 16px 16px; }
    .place-name-ko { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
    .place-name-en { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .place-category { margin-top: 7px; font-size: 12px; font-weight: 600; color: var(--muted); }
    .place-desc { margin-top: 5px; font-size: 13px; color: #4b5563; line-height: 1.6; }
    .place-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .place-tag {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 100px;
      background: #f0f4f8; color: var(--muted); border: 1px solid var(--line);
    }
    .place-link-hint { margin-top: 10px; font-size: 11px; color: var(--subtle); }
    .empty-state { padding: 48px 20px; text-align: center; color: var(--muted); font-size: 14px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .hero { padding: 0 18px 32px; }
      .summary-row { padding: 16px 18px 0; }
      .content-area { padding: 28px 18px 60px; }
      .day-date-col { width: 66px; padding: 13px 8px; }
      .stops { padding-left: 80px; }
      .eats-grid { grid-template-columns: 1fr; }
      .sub-btn { padding: 11px 13px; }
    }
  </style>
</head>

function categoryEmoji(cat) {
  for (const [key, emoji] of Object.entries(CATEGORY_EMOJI)) {
    if (cat.includes(key)) return emoji;
  }
  return "🍴";
}

const NON_MEAL_KEYWORDS = ["카페","브런치","아이스크림","디저트","베이커리"];
function isMeal(cat) { return !NON_MEAL_KEYWORDS.some(k => cat.includes(k)); }

/* ═══════════════════════════════
   SCHEDULE RENDERING
═══════════════════════════════ */
function stopHTML(s) {
  return `<div class="stop-row">
    <div class="stop-line-col"><div class="stop-dot"></div><div class="stop-connector"></div></div>
    <div class="stop-text">${s.t}</div>
  </div>`;
}

function dayCardHTML(d) {
  return `
    <article class="day-card">
      <div class="day-card-head">
        <div class="day-date-col">
          <div class="day-date-num">${d.date}</div>
          <div class="day-date-dow">${d.dow}</div>
        </div>
        <div class="day-title-col"><h3>${d.title}</h3></div>
      </div>
      <div class="stops">${d.stops.map(stopHTML).join("")}</div>
    </article>`;
}

function renderSchedule(cityFilter) {
  const el = document.getElementById("schedule-content");

  if (cityFilter === "all") {
    // 날짜 순서대로 전체 — 도시 색상은 카드 border-left로 구분
    el.innerHTML = `<div class="days-grid">${DAYS.map(d => {
      return `<article class="day-card" style="border-left:3px solid var(--${d.city})">
        <div class="day-card-head">
          <div class="day-date-col">
            <div class="day-date-num">${d.date}</div>
            <div class="day-date-dow">${d.dow}</div>
          </div>
          <div class="day-title-col"><h3>${d.title}</h3></div>
        </div>
        <div class="stops ${d.city}">${d.stops.map(stopHTML).join("")}</div>
      </article>`;
    }).join("")}</div>`;
  } else {
    // 도시별 필터
    const city = CITIES.find(c => c.id === cityFilter);
    const ds = DAYS.filter(d => d.city === cityFilter);
    el.innerHTML = `<section class="city-section ${cityFilter}">
      <div class="city-header">
        <h2>${city.name}</h2>
        <span class="city-range">${city.range}</span>
      </div>
      <div class="days-grid">${ds.map(dayCardHTML).join("")}</div>
    </section>`;
  }
}

document.querySelectorAll("#schedule-city-nav .sub-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#schedule-city-nav .sub-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderSchedule(btn.dataset.city);
  });
});

/* ═══════════════════════════════
   EATS / MASSAGE RENDERING
═══════════════════════════════ */
let currentCategory = "hanoi-eats";   // hanoi-eats | sapa-eats | massage
let currentMassageCity = "hanoi";     // 마사지 탭 안 도시 필터

function placeCardHTML(p) {
  const nameEn = p.nameEn ? `<div class="place-name-en">${p.nameEn}</div>` : "";
  const desc = p.desc ? `<div class="place-desc">${p.desc}</div>` : "";
  return `
    <a class="place-card" href="${p.mapUrl}" target="_blank" rel="noopener">
      <div class="place-info">
        <div class="place-name-ko">${p.nameKo}</div>
        ${nameEn}
        <div class="place-category">${categoryEmoji(p.category)} ${p.category}</div>
        ${desc}
        <div class="place-link-hint">📍 Google Maps에서 보기</div>
      </div>
    </a>`;
}

function renderEats() {
  const landmarkStrip = document.getElementById("landmark-strip");
  const grid = document.getElementById("eats-content");

  if (currentCategory === "massage") {
    // 마사지 탭: 하노이 / 사파 서브 필터
    landmarkStrip.innerHTML = `
      <button class="lm-btn${currentMassageCity==="hanoi"?" active":""}" data-mcity="hanoi">하노이</button>
      <button class="lm-btn${currentMassageCity==="sapa"?" active":""}" data-mcity="sapa">사파</button>
    `;
    document.querySelectorAll(".lm-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        currentMassageCity = btn.dataset.mcity;
        renderEats();
      });
    });
    const places = MASSAGE_DATA[currentMassageCity];
    grid.innerHTML = places.length
      ? places.map(placeCardHTML).join("")
      : `<div class="empty-state">곧 정보가 추가될 예정이에요 💆</div>`;
  } else {
    // 맛집 탭: 필터 없이 바로 표시
    landmarkStrip.innerHTML = "";
    const cityKey = currentCategory === "hanoi-eats" ? "hanoi" : "sapa";
    const places = EATS_DATA[cityKey];
    grid.innerHTML = places.length
      ? places.map(placeCardHTML).join("")
      : `<div class="empty-state">곧 맛집 정보가 추가될 예정이에요 🍜</div>`;
  }
}

document.querySelectorAll("#eats-city-nav .sub-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#eats-city-nav .sub-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentCategory = btn.dataset.cat;
    renderEats();
  });
});

/* ═══════════════════════════════
   TOP TAB SWITCHING
═══════════════════════════════ */
let currentTopTab = "schedule";
function showTab(tabId) {
  currentTopTab = tabId;
  document.querySelectorAll(".top-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tabId));
  document.querySelectorAll("[id^='tab-']").forEach(el => el.style.display = "none");
  document.getElementById(`tab-${tabId}`).style.display = "block";
  window.scrollTo({ top: 0 });
}
document.querySelectorAll(".top-tab").forEach(btn => {
  btn.addEventListener("click", () => showTab(btn.dataset.tab));
});

/* ── INIT ── */
renderSchedule("all");
renderEats();
</script>
